<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajesh Digital 24 | Final Fixed</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --p-blue: #1e44d1; --p-green: #10b981; --p-red: #ef4444; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 10px; }
        .app-card { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 8px solid var(--p-blue); }
        .main-content { padding: 15px; }
        .entry-box { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 13px; color: #444; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; font-size: 15px; }
        .btn-money-submit { background: #4f46e5; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; font-size: 16px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .act-btn { padding: 12px 5px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .filter-panel { background: #fffbeb; padding: 15px; border-radius: 10px; border: 1px solid #fde68a; margin-bottom: 20px; }
        .btn-dl { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 10px; text-align: left; border: 1px solid #e2e8f0; font-size: 12px; }
        th { background: #f1f5f9; color: #1e3a8a; }
    </style>
</head>
<body onload="initApp()">

<div class="app-card">
    <div style="text-align:center; padding:15px; border-bottom:1px solid #eee;">
        <h2 style="margin:0; color:var(--p-blue);">রাজেশ ডিজিটাল ২৪ | মাস্টার খাতা</h2>
    </div>

    <div class="main-content">
        <div class="entry-box">
            <label>📅 ডাটা সেভের তারিখ:</label>
            <input type="date" id="targetDate">
            
            <label>👤 স্টাফের নাম:</label>
            <select id="staffName">
                <option value="">-- নাম বেছে নিন --</option>
                <option value="Rajesh Majumdar">রাজেশ মজুমদার</option>
                <option value="Staff 1">স্টাফ ১</option>
                <option value="Staff 2">স্টাফ ২</option>
            </select>

            <label>💰 জমা টাকা (যদি থাকে):</label>
            <input type="number" id="takenMoney" placeholder="০">
            
            <button onclick="saveRecord('টাকা জমা')" class="btn-money-submit">টাকা জমা করুন</button>

            <div class="action-grid">
                <button onclick="saveRecord('IN')" class="act-btn" style="background:var(--p-green);">IN</button>
                <button onclick="saveRecord('OUT')" class="act-btn" style="background:#64748b);">OUT</button>
                <button onclick="saveRecord('HALF DAY')" class="act-btn" style="background:#f59e0b;">HALF</button>
                <button onclick="saveRecord('LEAVE')" class="act-btn" style="background:var(--p-red);">LEAVE</button>
            </div>
        </div>

        <div class="filter-panel">
            <label>📅 আগের ডাটা দেখতে ও ডাউনলোড করতে তারিখ বাছুন:</label>
            <input type="date" id="viewDate" onchange="displayTable()">
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-dl" style="background:#166534;" onclick="exportExcel()">📊 Excel</button>
                <button class="btn-dl" style="background:#e11d48;" onclick="exportPDF()">📄 PDF</button>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table id="masterTable">
                <thead>
                    <tr>
                        <th>তারিখ</th>
                        <th>নাম</th>
                        <th>জমা (₹)</th>
                        <th>সময়</th>
                        <th>অবস্থা</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function initApp() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('targetDate').value = today;
        document.getElementById('viewDate').value = today;
        displayTable();
    }

    function saveRecord(status) {
        const date = document.getElementById('targetDate').value;
        const name = document.getElementById('staffName').value;
        const money = document.getElementById('takenMoney').value || "0";

        if(!name) { alert("নাম বাছুন!"); return; }

        const entry = {
            date: date,
            name: name,
            money: money,
            time: new Date().toLocaleTimeString(),
            status: status
        };

        let db = JSON.parse(localStorage.getItem('rajesh_ledger_final_v25')) || [];
        db.unshift(entry);
        localStorage.setItem('rajesh_ledger_final_v25', JSON.stringify(db));

        document.getElementById('takenMoney').value = "";
        document.getElementById('viewDate').value = date; // যে তারিখে সেভ হলো সেটাই দেখাবে
        displayTable();
        alert(status + " সেভ হয়েছে!");
    }

    function displayTable() {
        const filterDate = document.getElementById('viewDate').value;
        const db = JSON.parse(localStorage.getItem('rajesh_ledger_final_v25')) || [];
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        const filtered = db.filter(item => item.date === filterDate);
        if(filtered.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>ডাটা নেই</td></tr>";
            return;
        }

        filtered.forEach(item => {
            tbody.innerHTML += `<tr>
                <td>${item.date}</td>
                <td>${item.name}</td>
                <td>₹${item.money}</td>
                <td>${item.time}</td>
                <td>${item.status}</td>
            </tr>`;
        });
    }

    // এক্সেল ডাউনলোড ফিক্স
    function exportExcel() {
        try {
            if (typeof XLSX === 'undefined') {
                alert("লাইব্রেরি লোড হচ্ছে, ৫ সেকেন্ড পর আবার চেষ্টা করুন।");
                return;
            }
            const table = document.getElementById("masterTable");
            const workbook = XLSX.utils.table_to_book(table);
            XLSX.writeFile(workbook, ⁠ Report_${document.getElementById('viewDate').value}.xlsx ⁠);
        } catch (e) { alert("Error: " + e.message); }
    }

    // পিডিএফ ডাউনলোড ফিক্স
    function exportPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Rajesh Digital 24 - Report", 14, 15);
            doc.autoTable({ html: '#masterTable', startY: 20 });
            doc.save(⁠ Report_${document.getElementById('viewDate').value}.pdf ⁠);
        } catch (e) { alert("PDF Error: লাইব্রেরি লোড হতে দেরি হচ্ছে।"); }
    }
</script>

</body>
</html>
